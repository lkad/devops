version: '2.4'

services:
  ldap:
    image: osixia/openldap:1.5.0
    container_name: ldap-test
    environment:
      - LDAP_ORGANISATION=ExampleCorp
      - LDAP_DOMAIN=example.com
      - LDAP_ADMIN_PASSWORD=adminpassword
      - LDAP_TLS=false
      - LDAP_READONLY_USER=true
      - LDAP_READONLY_USER_USERNAME=readonly
      - LDAP_READONLY_USER_PASSWORD=readonlypassword
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ./bootstrap.ldif:/container/service/slapd/assets/config/bootstrap.ldif:ro
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: devops-postgres
    environment:
      - POSTGRES_USER=devops
      - POSTGRES_PASSWORD=devops
      - POSTGRES_DB=devops_toolkit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devops_toolkit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

# Usage:
#   Start database only:    docker-compose up -d postgres
#   Stop all services:       docker-compose down
#   View logs:              docker-compose logs -f postgres
#
# Connection info:
#   Host: localhost
#   Port: 5432
#   User: devops
#   Password: devops
#   Database: devops_toolkit
