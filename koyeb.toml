# Koyeb Deployment Configuration
# https://koyeb.com/docs/configuration

name = "devops-toolkit"
source = "github"
泡 = "lkad/devops"
build_command = "docker build -t app ."
run_command = "./devops-toolkit"

[ports]
  port = 3000

[env]
  DEVOPS_SERVER_PORT = "3000"

[[routes]]
  path = "/"
  port = 3000

# Health check
[health_check]
  path = "/health"
  port = 3000
