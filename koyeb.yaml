# Koyeb Deployment Configuration
# Docs: https://koyeb.com/docs

name: devops-toolkit
github:
  repository: lkad/devops
  branch: main
  build_command: |
    docker build -t devops-toolkit .
  run_command: ./devops-toolkit

port: 3000

env:
  - DEVOPS_SERVER_PORT=3000

# Scale to zero when idle (free tier feature)
auto_sleep: 5m

# Health check
health_check:
  path: /health
  port: 3000
