global
    log stdout format raw
    maxconn 4096
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  redispatch
    retries 3
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 403 /usr/local/etc/haproxy/errors/403.http
    errorfile 408 /usr/local/etc/haproxy/errors/408.http
    errorfile 500 /usr/local/etc/haproxy/errors/500.http
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http
    errorfile 504 /usr/local/etc/haproxy/errors/504.http

# Frontend: HTTP
frontend http_front
    bind *:80
    mode http
    default_backend web_servers

    # Health check endpoint
    use_backend health_check if { path /health }

# Backend: Web servers
backend web_servers
    mode http
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200

    server web-01 server-web-01:80 check inter 2000 rise 2 fall 3
    server web-02 server-web-02:80 check inter 2000 rise 2 fall 3

# Frontend: HTTPS (passthrough)
frontend https_front
    bind *:443
    mode tcp
    default_backend web_servers_https

    # Health check endpoint
    use_backend health_check if { path /health }

# Backend: Web servers HTTPS
backend web_servers_https
    mode tcp
    balance roundrobin
    server web-01 server-web-01:443 check inter 2000 rise 2 fall 3
    server web-02 server-web-02:443 check inter 2000 rise 2 fall 3

# Health check backend
backend health_check
    mode http
    server health-server localhost:8080 check inter 1000 rise 1 fall 1
