# DevOps Toolkit - Docker 测试环境
# 多设备类型编排：服务器容器层、网络设备层、监控层

services:
  # === 服务器容器层 ===
  server-web-01:
    image: nginx:alpine
    container_name: server-web-01
    environment:
      - DEVOPS_AGENT=true
      - APP_PORT=8081
    ports:
      - "8081:80"
    labels:
      - env=development
      - device_type=web
      - device_group=frontend
    networks:
      - devops-test-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  server-web-02:
    image: nginx:alpine
    container_name: server-web-02
    environment:
      - DEVOPS_AGENT=true
      - APP_PORT=8082
    ports:
      - "8082:80"
    labels:
      - env=development
      - device_type=web
      - device_group=frontend
    networks:
      - devops-test-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  server-app-01:
    image: node:18-alpine
    container_name: server-app-01
    working_dir: /app
    environment:
      - DEVOPS_AGENT=true
      - NODE_ENV=development
      - DB_HOST=devops-db-mysql
      - DB_PORT=3306
      - REDIS_HOST=devops-cache-redis
      - REDIS_PORT=6379
    ports:
      - "3000:3000"
    volumes:
      - devops-configs-server-01:/app/config:ro
    labels:
      - env=development
      - device_type=app
      - device_group=backend
    networks:
      - devops-test-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      devops-db-mysql:
        condition: service_healthy
      devops-cache-redis:
        condition: service_healthy

  # === 数据库容器 ===
  devops-db-mysql:
    image: mysql:8.0
    container_name: devops-db-mysql
    environment:
      MYSQL_ROOT_PASSWORD: devops_demo_123
      MYSQL_DATABASE: devops_toolkit
      MYSQL_USER: devops_user
      MYSQL_PASSWORD: devops_pass
    ports:
      - "3306:3306"
    volumes:
      - devops-data-db:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - devops-test-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdevops_demo_123"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # === 缓存容器 ===
  devops-cache-redis:
    image: redis:7-alpine
    container_name: devops-cache-redis
    ports:
      - "6379:6379"
    volumes:
      - devops-data-redis:/data
    networks:
      - devops-test-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # === 网络设备层 ===
  loadbalancer-devops:
    image: haproxy:2.8-alpine
    container_name: loadbalancer-devops
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - devops-test-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - server-web-01
      - server-web-02

  # === 监控层 ===
  devops-node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: devops-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem'
      - '--collector.netdev'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    ports:
      - "9100:9100"
    networks:
      - devops-test-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  devops-prometheus:
    image: prom/prometheus:v2.48.0
    container_name: devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - devops-test-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  devops-grafana:
    image: grafana/grafana:10.2.2
    container_name: devops-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3030:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - devops-test-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  devops-test-net:
    driver: bridge
    name: devops-test-network

volumes:
  devops-configs-server-01:
  devops-data-db:
  devops-data-redis:
  prometheus-data:
  grafana-data:
