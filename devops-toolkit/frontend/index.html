<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Toolkit - 设备管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    header { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); border-bottom: 1px solid #475569; padding: 20px 0; margin-bottom: 30px; }
    header h1 { font-size: 1.8rem; font-weight: 600; background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    header p { color: #94a3b8; margin-top: 5px; font-size: 0.9rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
    .stat-card .label { font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; }
    .stat-card .value { font-size: 2.5rem; font-weight: 700; margin-top: 10px; }
    .stat-card .value.active { color: #22c55e; }
    .stat-card .value.pending { color: #f59e0b; }
    .stat-card .value.error { color: #ef4444; }
    .stat-card .value.total { color: #60a5fa; }
    .section { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .section-title { font-size: 1.2rem; font-weight: 600; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #475569; color: #e2e8f0; }
    .btn-secondary:hover { background: #64748b; }
    .filters { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-group { display: flex; align-items: center; gap: 8px; }
    .filter-group label { font-size: 0.85rem; color: #94a3b8; }
    select, input { background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 8px 12px; color: #e2e8f0; font-size: 0.9rem; }
    select:focus, input:focus { outline: none; border-color: #3b82f6; }
    .device-list { display: grid; gap: 12px; }
    .device-item { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 16px 20px; display: grid; grid-template-columns: 1fr auto auto auto; align-items: center; gap: 20px; }
    .device-item:hover { border-color: #475569; }
    .device-info h3 { font-size: 1rem; color: #f1f5f9; margin-bottom: 4px; }
    .device-info p { font-size: 0.8rem; color: #64748b; }
    .device-type { display: inline-block; padding: 4px 10px; background: #334155; border-radius: 4px; font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; }
    .device-status { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 500; }
    .status-active { background: rgba(34,197,94,0.15); color: #22c55e; }
    .status-pending { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .status-inactive { background: rgba(100,116,139,0.15); color: #94a3b8; }
    .status-error { background: rgba(239,68,68,0.15); color: #ef4444; }
    .device-actions { display: flex; gap: 8px; }
    .btn-icon { padding: 8px; background: #334155; border: none; border-radius: 6px; color: #94a3b8; cursor: pointer; transition: all 0.2s; }
    .btn-icon:hover { background: #475569; color: #e2e8f0; }
    .btn-icon.danger:hover { background: rgba(239,68,68,0.2); color: #ef4444; }
    .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 30px; width: 100%; max-width: 500px; }
    .modal h2 { font-size: 1.3rem; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
    .toast { position: fixed; bottom: 20px; right: 20px; padding: 14px 24px; border-radius: 8px; font-size: 0.9rem; transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 1001; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #22c55e; color: white; }
    .toast.error { background: #ef4444; color: white; }
    @media (max-width: 768px) { .device-item { grid-template-columns: 1fr; } .device-actions { justify-content: flex-start; } }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>DevOps Toolkit - 设备管理</h1>
      <p>统一管理物理机、容器、网络设备和云实例</p>
    </div>
  </header>
  <main class="container">
    <div class="stats-grid">
      <div class="stat-card"><div class="label">总设备数</div><div class="value total" id="stat-total">0</div></div>
      <div class="stat-card"><div class="label">在线设备</div><div class="value active" id="stat-active">0</div></div>
      <div class="stat-card"><div class="label">待注册</div><div class="value pending" id="stat-pending">0</div></div>
      <div class="stat-card"><div class="label">异常设备</div><div class="value error" id="stat-error">0</div></div>
    </div>
    <div class="section">
      <div class="section-header">
        <h2 class="section-title">设备列表</h2>
        <button class="btn btn-primary" onclick="openAddModal()">+ 添加设备</button>
      </div>
      <div class="filters">
        <div class="filter-group"><label>类型:</label><select id="filter-type" onchange="renderDevices()"><option value="">全部</option><option value="container">容器</option><option value="physical_host">物理主机</option><option value="network_device">网络设备</option><option value="cloud_instance">云实例</option><option value="iot_device">IoT设备</option></select></div>
        <div class="filter-group"><label>状态:</label><select id="filter-status" onchange="renderDevices()"><option value="">全部</option><option value="active">在线</option><option value="pending">待注册</option><option value="inactive">离线</option><option value="error">异常</option></select></div>
        <div class="filter-group"><label>搜索:</label><input type="text" id="filter-search" placeholder="设备名称或ID..." oninput="renderDevices()"></div>
      </div>
      <div class="device-list" id="device-list"><div class="empty-state"><p>暂无设备</p></div></div>
    </div>
  </main>
  <div class="modal-overlay" id="add-modal">
    <div class="modal">
      <h2>添加设备</h2>
      <form id="add-device-form">
        <div class="form-group"><label>设备名称</label><input type="text" id="device-name" required placeholder="例如: web-server-01"></div>
        <div class="form-group"><label>设备类型</label><select id="device-type" required><option value="container">容器 (Container)</option><option value="physical_host">物理主机</option><option value="network_device">网络设备</option><option value="cloud_instance">云实例</option><option value="iot_device">IoT设备</option></select></div>
        <div class="form-group"><label>业务单元</label><input type="text" id="device-business-unit" placeholder="例如: frontend, backend"></div>
        <div class="form-group"><label>标签 (逗号分隔)</label><input type="text" id="device-labels" placeholder="例如: env:dev, region:us-east"></div>
        <div class="modal-actions"><button type="button" class="btn btn-secondary" onclick="closeAddModal()">取消</button><button type="submit" class="btn btn-primary">添加</button></div>
      </form>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    let devices = [];
    document.addEventListener('DOMContentLoaded', () => { loadDevices(); document.getElementById('add-device-form').addEventListener('submit', handleAddDevice); });
    async function loadDevices() {
      try {
        const response = await fetch('/api/devices');
        if (response.ok) { const data = await response.json(); devices = data.devices || []; }
        else { devices = getSampleDevices(); }
      } catch { devices = getSampleDevices(); }
      renderDevices(); updateStats();
    }
    function getSampleDevices() {
      return [
        { id: 'dev-001', name: 'server-web-01', type: 'container', status: 'active', business_unit: 'frontend', labels: [{ env: 'development' }] },
        { id: 'dev-002', name: 'server-web-02', type: 'container', status: 'active', business_unit: 'frontend', labels: [{ env: 'development' }] },
        { id: 'dev-003', name: 'server-app-01', type: 'container', status: 'active', business_unit: 'backend', labels: [{ env: 'development' }] },
        { id: 'dev-004', name: 'loadbalancer-devops', type: 'network_device', status: 'active', business_unit: 'infrastructure', labels: [{ env: 'development' }] },
        { id: 'dev-005', name: 'db-primary-01', type: 'physical_host', status: 'active', business_unit: 'database', labels: [{ env: 'production' }] },
        { id: 'dev-006', name: 'switch-core-01', type: 'network_device', status: 'inactive', business_unit: 'infrastructure', labels: [{ env: 'production' }] },
        { id: 'dev-007', name: 'iot-sensor-01', type: 'iot_device', status: 'error', business_unit: 'iot', labels: [{ env: 'production' }] },
      ];
    }
    function renderDevices() {
      const list = document.getElementById('device-list');
      const typeFilter = document.getElementById('filter-type').value;
      const statusFilter = document.getElementById('filter-status').value;
      const searchFilter = document.getElementById('filter-search').value.toLowerCase();
      let filtered = devices.filter(d => {
        if (typeFilter && d.type !== typeFilter) return false;
        if (statusFilter && d.status !== statusFilter) return false;
        if (searchFilter && !d.name.toLowerCase().includes(searchFilter) && !d.id.toLowerCase().includes(searchFilter)) return false;
        return true;
      });
      if (filtered.length === 0) { list.innerHTML = '<div class="empty-state"><p>没有找到匹配的设备</p></div>'; return; }
      list.innerHTML = filtered.map(device => `
        <div class="device-item">
          <div class="device-info"><h3>${device.name}</h3><p>${device.id} · ${device.business_unit || '未分配'}</p></div>
          <span class="device-type">${getTypeLabel(device.type)}</span>
          <span class="device-status status-${device.status}">${getStatusLabel(device.status)}</span>
          <div class="device-actions">
            <button class="btn-icon" onclick="viewDevice('${device.id}')" title="查看">👁</button>
            <button class="btn-icon" onclick="editDevice('${device.id}')" title="编辑">✏</button>
            <button class="btn-icon danger" onclick="deleteDevice('${device.id}')" title="删除">🗑</button>
          </div>
        </div>`).join('');
    }
    function updateStats() {
      document.getElementById('stat-total').textContent = devices.length;
      document.getElementById('stat-active').textContent = devices.filter(d => d.status === 'active').length;
      document.getElementById('stat-pending').textContent = devices.filter(d => d.status === 'pending').length;
      document.getElementById('stat-error').textContent = devices.filter(d => d.status === 'error').length;
    }
    function getTypeLabel(type) { const labels = { container: '容器', physical_host: '物理主机', network_device: '网络设备', cloud_instance: '云实例', iot_device: 'IoT设备' }; return labels[type] || type; }
    function getStatusLabel(status) { const labels = { active: '在线', pending: '待注册', inactive: '离线', error: '异常' }; return labels[status] || status; }
    function openAddModal() { document.getElementById('add-modal').classList.add('active'); }
    function closeAddModal() { document.getElementById('add-modal').classList.remove('active'); document.getElementById('add-device-form').reset(); }
    function handleAddDevice(e) {
      e.preventDefault();
      const name = document.getElementById('device-name').value;
      const type = document.getElementById('device-type').value;
      const businessUnit = document.getElementById('device-business-unit').value;
      const labelsInput = document.getElementById('device-labels').value;
      const labels = labelsInput.split(',').map(l => { const [key, value] = l.trim().split(':'); return key && value ? { [key.trim()]: value.trim() } : null; }).filter(l => l);
      const device = { id: 'dev-' + Date.now(), name, type, status: 'pending', business_unit: businessUnit || null, labels };
      devices.push(device); closeAddModal(); renderDevices(); updateStats(); showToast('设备添加成功', 'success');
      fetch('/api/devices', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(device) }).catch(() => {});
    }
    function viewDevice(id) { const device = devices.find(d => d.id === id); if (device) { alert(`设备详情:\n\nID: ${device.id}\n名称: ${device.name}\n类型: ${getTypeLabel(device.type)}\n状态: ${getStatusLabel(device.status)}\n业务单元: ${device.business_unit || '未分配'}`); } }
    function editDevice(id) { showToast('编辑功能开发中...', 'success'); }
    function deleteDevice(id) { if (confirm('确定要删除这个设备吗?')) { devices = devices.filter(d => d.id !== id); renderDevices(); updateStats(); showToast('设备已删除', 'success'); fetch(`/api/devices/${id}`, { method: 'DELETE' }).catch(() => {}); } }
    function showToast(message, type = 'success') { const toast = document.getElementById('toast'); toast.textContent = message; toast.className = `toast ${type} show`; setTimeout(() => { toast.classList.remove('show'); }, 3000); }
  </script>
</body>
</html>
