<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Toolkit - 设备管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #22d3ee;
      --color-primary-hover: #06b6d4;
      --color-primary-muted: rgba(34, 211, 238, 0.15);
      --color-success: #22c55e;
      --color-warning: #f59e0b;
      --color-error: #ef4444;
      --color-info: #3b82f6;
      --color-bg: #0c1220;
      --color-surface: #151d2e;
      --color-surface-elevated: #1c2940;
      --color-border: #2a3a54;
      --color-border-subtle: #1e2d42;
      --color-text: #f1f5f9;
      --color-text-secondary: #94a3b8;
      --color-text-muted: #64748b;
      --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-sans); background: var(--color-bg); color: var(--color-text); min-height: 100vh; line-height: 1.6; }

    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

    /* Header */
    header { background: linear-gradient(135deg, var(--color-surface) 0%, var(--color-surface-elevated) 100%); border-bottom: 1px solid var(--color-border); padding: 20px 0; margin-bottom: 30px; }
    header h1 { font-size: 1.75rem; font-weight: 700; background: linear-gradient(90deg, var(--color-primary), #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    header p { color: var(--color-text-secondary); margin-top: 5px; font-size: 0.9rem; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 20px; transition: all 0.2s; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--color-primary); }
    .stat-card .label { font-size: 0.8rem; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 2.5rem; font-weight: 700; margin-top: 10px; }
    .stat-card .value.total { color: var(--color-primary); }
    .stat-card .value.active { color: var(--color-success); }
    .stat-card .value.pending { color: var(--color-warning); }
    .stat-card .value.error { color: var(--color-error); }

    /* Section */
    .section { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-xl); padding: 24px; margin-bottom: 20px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .section-title { font-size: 1.1rem; font-weight: 600; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: var(--space-2); padding: 10px 20px; border: none; border-radius: var(--radius-md); font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.15s; font-family: var(--font-sans); }
    .btn-primary { background: var(--color-primary); color: var(--color-bg); }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-secondary { background: var(--color-surface-elevated); color: var(--color-text); border: 1px solid var(--color-border); }
    .btn-secondary:hover { background: var(--color-border); }
    .btn-danger { background: var(--color-error); color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-ghost { background: transparent; color: var(--color-text-secondary); border: 1px solid var(--color-border); }
    .btn-ghost:hover { background: var(--color-surface-elevated); color: var(--color-text); }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

    /* Filters */
    .filters { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-group { display: flex; align-items: center; gap: 8px; }
    .filter-group label { font-size: 0.85rem; color: var(--color-text-muted); }
    select, input { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 8px 12px; color: var(--color-text); font-size: 0.9rem; font-family: var(--font-sans); }
    select:focus, input:focus { outline: none; border-color: var(--color-primary); }

    /* Device List */
    .device-list { display: grid; gap: 12px; }
    .device-item { background: var(--color-bg); border: 1px solid var(--color-border-subtle); border-radius: var(--radius-lg); padding: 16px 20px; display: grid; grid-template-columns: 1fr auto auto auto; align-items: center; gap: 20px; transition: all 0.15s; cursor: pointer; }
    .device-item:hover { border-color: var(--color-border); background: var(--color-surface-elevated); transform: translateX(4px); }
    .device-info h3 { font-size: 0.95rem; font-weight: 500; color: var(--color-text); margin-bottom: 2px; }
    .device-info p { font-size: 0.8rem; color: var(--color-text-muted); font-family: var(--font-mono); }
    .device-type { display: inline-block; padding: 4px 10px; background: var(--color-surface-elevated); border-radius: var(--radius-sm); font-size: 0.75rem; color: var(--color-text-secondary); text-transform: uppercase; }
    .device-status { display: inline-block; padding: 4px 10px; border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 500; }
    .status-active { background: rgba(34,197,94,0.15); color: var(--color-success); }
    .status-pending { background: rgba(245,158,11,0.15); color: var(--color-warning); }
    .status-inactive { background: rgba(100,116,139,0.15); color: var(--color-text-muted); }
    .status-error { background: rgba(239,68,68,0.15); color: var(--color-error); }
    .device-actions { display: flex; gap: 8px; }
    .btn-icon { padding: 8px; background: transparent; border: 1px solid var(--color-border); border-radius: var(--radius-md); color: var(--color-text-muted); cursor: pointer; transition: all 0.15s; font-size: 14px; }
    .btn-icon:hover { background: var(--color-surface-elevated); color: var(--color-text); border-color: var(--color-text-muted); }
    .btn-icon.danger:hover { background: rgba(239,68,68,0.15); color: var(--color-error); border-color: var(--color-error); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--color-text-muted); }

    /* Pipeline */
    .pipeline-list, .run-list { display: grid; gap: 12px; }
    .pipeline-item, .run-item { background: var(--color-bg); border: 1px solid var(--color-border-subtle); border-radius: var(--radius-lg); padding: 16px 20px; transition: all 0.15s; }
    .pipeline-item:hover, .run-item:hover { border-color: var(--color-border); background: var(--color-surface-elevated); }
    .pipeline-info, .run-info { display: flex; justify-content: space-between; align-items: center; }
    .pipeline-info h3, .run-info h3 { font-size: 0.95rem; font-weight: 500; margin-bottom: 4px; }
    .pipeline-info p, .run-info p { font-size: 0.8rem; color: var(--color-text-muted); font-family: var(--font-mono); }
    .pipeline-meta, .run-meta { display: flex; gap: 15px; align-items: center; }
    .pipeline-status, .run-status { display: inline-block; padding: 4px 10px; border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 500; }
    .pipeline-stages { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .stage-badge { padding: 4px 8px; background: var(--color-surface-elevated); border-radius: var(--radius-sm); font-size: 0.7rem; color: var(--color-text-secondary); }
    .stage-badge.success { background: rgba(34,197,94,0.15); color: var(--color-success); }
    .stage-badge.failed { background: rgba(239,68,68,0.15); color: var(--color-error); }
    .stage-badge.running { background: rgba(34,211,238,0.15); color: var(--color-primary); }
    .stage-badge.pending { background: rgba(100,116,139,0.15); color: var(--color-text-muted); }

    /* Run Log */
    .run-logs { background: var(--color-bg); border: 1px solid var(--color-border-subtle); border-radius: var(--radius-lg); padding: 16px; margin-top: 16px; max-height: 300px; overflow-y: auto; font-family: var(--font-mono); font-size: 0.8rem; }
    .log-entry { padding: 4px 0; color: var(--color-text-secondary); border-bottom: 1px solid var(--color-border-subtle); }
    .log-entry:last-child { border-bottom: none; }
    .log-timestamp { color: var(--color-text-muted); margin-right: 8px; }
    .log-level-badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 0.7rem; font-weight: 500; margin-right: 8px; }
    .log-level-badge.debug { background: rgba(59,130,246,0.15); color: var(--color-info); }
    .log-level-badge.info { background: rgba(34,197,94,0.15); color: var(--color-success); }
    .log-level-badge.warn { background: rgba(245,158,11,0.15); color: var(--color-warning); }
    .log-level-badge.error { background: rgba(239,68,68,0.15); color: var(--color-error); }
    .log-source { color: var(--color-primary); font-family: var(--font-mono); font-size: 0.75rem; }
    .log-message { color: var(--color-text); }
    .log-item { background: var(--color-bg); border: 1px solid var(--color-border-subtle); border-radius: var(--radius-md); padding: 12px 16px; margin-bottom: 8px; }
    .log-item:hover { border-color: var(--color-border); background: var(--color-surface-elevated); }
    .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .log-meta { font-size: 0.75rem; color: var(--color-text-muted); }
    .alert-rule { background: var(--color-bg); border: 1px solid var(--color-border-subtle); border-radius: var(--radius-md); padding: 12px 16px; margin-bottom: 8px; }
    .alert-rule.enabled { border-color: var(--color-warning); }
    .alert-rule .name { font-weight: 500; margin-bottom: 4px; }
    .alert-rule .pattern { font-family: var(--font-mono); font-size: 0.8rem; color: var(--color-text-secondary); }

    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-xl); padding: 30px; width: 100%; max-width: 900px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 1.3rem; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--color-text-secondary); margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
    .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--color-text-muted); font-size: 24px; cursor: pointer; }

    /* Detail Page */
    .detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
    .detail-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; }
    .detail-meta { color: var(--color-text-muted); font-size: 0.9rem; font-family: var(--font-mono); }
    .detail-badges { display: flex; gap: 8px; margin-top: 12px; }
    .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 24px; }
    .detail-card { background: var(--color-bg); border: 1px solid var(--color-border-subtle); border-radius: var(--radius-lg); padding: 20px; }
    .detail-card h3 { font-size: 0.9rem; font-weight: 600; color: var(--color-text-secondary); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
    .metric-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--color-border-subtle); }
    .metric-row:last-child { border-bottom: none; }
    .metric-label { color: var(--color-text-muted); font-size: 0.9rem; }
    .metric-value { font-weight: 500; font-family: var(--font-mono); }
    .metric-bar { height: 8px; background: var(--color-border); border-radius: 4px; margin-top: 8px; overflow: hidden; }
    .metric-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .metric-bar-fill.cpu { background: var(--color-primary); }
    .metric-bar-fill.memory { background: var(--color-success); }
    .metric-bar-fill.disk { background: var(--color-warning); }
    .metric-bar-fill.network { background: var(--color-info); }

    /* Event Timeline */
    .event-timeline { display: flex; flex-direction: column; gap: 12px; }
    .event-item { display: flex; gap: 12px; padding: 12px; background: var(--color-bg); border-radius: var(--radius-md); border-left: 3px solid var(--color-border); }
    .event-item.status_change { border-left-color: var(--color-success); }
    .event-item.config_update { border-left-color: var(--color-info); }
    .event-item.heartbeat { border-left-color: var(--color-primary); }
    .event-item.error { border-left-color: var(--color-error); }
    .event-time { font-size: 0.8rem; color: var(--color-text-muted); font-family: var(--font-mono); white-space: nowrap; }
    .event-message { font-size: 0.9rem; color: var(--color-text); }
    .event-type { font-size: 0.75rem; color: var(--color-text-muted); text-transform: uppercase; margin-top: 4px; }

    /* Action Buttons */
    .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .action-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-lg); cursor: pointer; transition: all 0.15s; }
    .action-btn:hover { border-color: var(--color-primary); background: var(--color-primary-muted); }
    .action-btn .icon { font-size: 24px; }
    .action-btn .label { font-size: 0.85rem; color: var(--color-text); }
    .action-btn.restart:hover { border-color: var(--color-warning); }
    .action-btn.stop:hover { border-color: var(--color-error); }
    .action-btn.pause:hover { border-color: var(--color-info); }

    /* Toast */
    .toast { position: fixed; bottom: 20px; right: 20px; padding: 14px 24px; border-radius: var(--radius-md); font-size: 0.9rem; transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 1001; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--color-success); color: white; }
    .toast.error { background: var(--color-error); color: white; }
    .toast.info { background: var(--color-info); color: white; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--color-border); }
    .tab { padding: 12px 20px; background: none; border: none; color: var(--color-text-muted); font-size: 0.9rem; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab:hover { color: var(--color-text); }
    .tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Responsive */
    @media (max-width: 1024px) { .detail-grid { grid-template-columns: 1fr; } .action-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .device-item { grid-template-columns: 1fr; } .device-type, .device-status { display: none; } }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>DevOps Toolkit</h1>
      <p>统一设备管理与 CI/CD 自动化平台</p>
    </div>
  </header>

  <main class="container">
    <!-- Navigation Tabs -->
    <div class="nav-tabs" style="display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--color-border);">
      <button class="tab active" onclick="switchView('devices')" id="nav-devices">设备管理</button>
      <button class="tab" onclick="switchView('pipelines')" id="nav-pipelines">流水线</button>
      <button class="tab" onclick="switchView('runs')" id="nav-runs">执行记录</button>
      <button class="tab" onclick="switchView('logs')" id="nav-logs">日志</button>
    </div>

    <!-- Devices View -->
    <div id="view-devices" class="view active">
      <div class="stats-grid">
        <div class="stat-card"><div class="label">总设备数</div><div class="value total" id="stat-total">0</div></div>
        <div class="stat-card"><div class="label">在线设备</div><div class="value active" id="stat-active">0</div></div>
        <div class="stat-card"><div class="label">待注册</div><div class="value pending" id="stat-pending">0</div></div>
        <div class="stat-card"><div class="label">异常设备</div><div class="value error" id="stat-error">0</div></div>
      </div>

    <div class="section">
      <div class="section-header">
        <h2 class="section-title">设备列表</h2>
        <button class="btn btn-primary" onclick="openAddModal()">+ 添加设备</button>
      </div>

      <div class="filters">
        <div class="filter-group">
          <label>类型:</label>
          <select id="filter-type" onchange="renderDevices()">
            <option value="">全部</option>
            <option value="container">容器</option>
            <option value="physical_host">物理主机</option>
            <option value="network_device">网络设备</option>
            <option value="cloud_instance">云实例</option>
            <option value="iot_device">IoT设备</option>
          </select>
        </div>
        <div class="filter-group">
          <label>状态:</label>
          <select id="filter-status" onchange="renderDevices()">
            <option value="">全部</option>
            <option value="active">在线</option>
            <option value="pending">待注册</option>
            <option value="inactive">离线</option>
            <option value="error">异常</option>
          </select>
        </div>
        <div class="filter-group">
          <label>搜索:</label>
          <input type="text" id="filter-search" placeholder="设备名称或ID..." oninput="renderDevices()">
        </div>
      </div>

      <div class="device-list" id="device-list">
        <div class="empty-state"><p>暂无设备</p></div>
      </div>
    </div>
    </div><!-- End Devices View -->

    <!-- Pipelines View -->
    <div id="view-pipelines" class="view" style="display: none;">
      <div class="stats-grid">
        <div class="stat-card"><div class="label">流水线</div><div class="value total" id="pipeline-count">0</div></div>
        <div class="stat-card"><div class="label">运行中</div><div class="value active" id="pipeline-running">0</div></div>
        <div class="stat-card"><div class="label">成功</div><div class="value active" id="pipeline-success">0</div></div>
        <div class="stat-card"><div class="label">失败</div><div class="value error" id="pipeline-failed">0</div></div>
      </div>

      <div class="section">
        <div class="section-header">
          <h2 class="section-title">流水线列表</h2>
          <button class="btn btn-primary" onclick="openPipelineModal()">+ 创建流水线</button>
        </div>
        <div class="pipeline-list" id="pipeline-list">
          <div class="empty-state"><p>暂无流水线</p></div>
        </div>
      </div>
    </div><!-- End Pipelines View -->

    <!-- Runs View -->
    <div id="view-runs" class="view" style="display: none;">
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">最近执行记录</h2>
        </div>
        <div class="run-list" id="run-list">
          <div class="empty-state"><p>暂无执行记录</p></div>
        </div>
      </div>
    </div><!-- End Runs View -->

    <!-- Logs View -->
    <div id="view-logs" class="view" style="display: none;">
      <div class="stats-grid">
        <div class="stat-card"><div class="label">总日志</div><div class="value total" id="log-total">0</div></div>
        <div class="stat-card"><div class="label">最近1小时</div><div class="value active" id="log-last-hour">0</div></div>
        <div class="stat-card"><div class="label">错误率</div><div class="value error" id="log-error-rate">0%</div></div>
        <div class="stat-card"><div class="label">告警规则</div><div class="value warning" id="log-alert-count">0</div></div>
      </div>

      <div class="section">
        <div class="section-header">
          <h2 class="section-title">日志查询</h2>
          <div style="display: flex; gap: 10px;">
            <button class="btn btn-secondary btn-sm" onclick="generateLogs()">生成示例日志</button>
            <button class="btn btn-primary btn-sm" onclick="openAlertModal()">+ 创建告警</button>
          </div>
        </div>

        <div class="filters">
          <div class="filter-group">
            <label>级别:</label>
            <select id="log-level" onchange="loadLogs()">
              <option value="">全部</option>
              <option value="debug">Debug</option>
              <option value="info">Info</option>
              <option value="warn">Warn</option>
              <option value="error">Error</option>
            </select>
          </div>
          <div class="filter-group">
            <label>来源:</label>
            <input type="text" id="log-source" placeholder="例如: web-server" oninput="loadLogs()">
          </div>
          <div class="filter-group">
            <label>搜索:</label>
            <input type="text" id="log-search" placeholder="搜索日志内容..." oninput="loadLogs()">
          </div>
        </div>

        <div class="log-list" id="log-list">
          <div class="empty-state"><p>暂无日志</p></div>
        </div>
      </div>
    </div><!-- End Logs View -->
  </main>

  <!-- 添加设备弹窗 -->
  <div class="modal-overlay" id="add-modal">
    <div class="modal">
      <h2>添加设备</h2>
      <form id="add-device-form">
        <div class="form-group"><label>设备名称</label><input type="text" id="device-name" required placeholder="例如: web-server-01"></div>
        <div class="form-group"><label>设备类型</label><select id="device-type" required><option value="container">容器 (Container)</option><option value="physical_host">物理主机</option><option value="network_device">网络设备</option><option value="cloud_instance">云实例</option><option value="iot_device">IoT设备</option></select></div>
        <div class="form-group"><label>业务单元</label><input type="text" id="device-business-unit" placeholder="例如: frontend, backend"></div>
        <div class="form-group"><label>标签 (逗号分隔)</label><input type="text" id="device-labels" placeholder="例如: env:dev, region:us-east"></div>
        <div class="modal-actions"><button type="button" class="btn btn-secondary" onclick="closeAddModal()">取消</button><button type="submit" class="btn btn-primary">添加</button></div>
      </form>
    </div>
  </div>

  <!-- 设备详情弹窗 -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal" style="position: relative;">
      <button class="modal-close" onclick="closeDetailModal()">&times;</button>
      <div id="detail-content"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let devices = [];

    document.addEventListener('DOMContentLoaded', () => { loadDevices(); document.getElementById('add-device-form').addEventListener('submit', handleAddDevice); });

    async function loadDevices() {
      try {
        const response = await fetch('/api/devices');
        if (response.ok) { const data = await response.json(); devices = data.devices || []; }
        else { devices = getSampleDevices(); }
      } catch { devices = getSampleDevices(); }
      renderDevices(); updateStats();
    }

    function getSampleDevices() {
      return [
        { id: 'dev-001', name: 'server-web-01', type: 'container', status: 'active', business_unit: 'frontend', labels: [{ env: 'development' }], last_seen: new Date().toISOString() },
        { id: 'dev-002', name: 'server-web-02', type: 'container', status: 'active', business_unit: 'frontend', labels: [{ env: 'development' }], last_seen: new Date().toISOString() },
        { id: 'dev-003', name: 'server-app-01', type: 'container', status: 'active', business_unit: 'backend', labels: [{ env: 'development' }], last_seen: new Date().toISOString() },
        { id: 'dev-004', name: 'loadbalancer-devops', type: 'network_device', status: 'active', business_unit: 'infrastructure', labels: [{ env: 'development' }], last_seen: new Date().toISOString() },
        { id: 'dev-005', name: 'db-primary-01', type: 'physical_host', status: 'active', business_unit: 'database', labels: [{ env: 'production' }], last_seen: new Date().toISOString() },
        { id: 'dev-006', name: 'switch-core-01', type: 'network_device', status: 'inactive', business_unit: 'infrastructure', labels: [{ env: 'production' }], last_seen: new Date(Date.now() - 3600000).toISOString() },
        { id: 'dev-007', name: 'iot-sensor-01', type: 'iot_device', status: 'error', business_unit: 'iot', labels: [{ env: 'production' }], last_seen: new Date(Date.now() - 7200000).toISOString() },
      ];
    }

    function renderDevices() {
      const list = document.getElementById('device-list');
      const typeFilter = document.getElementById('filter-type').value;
      const statusFilter = document.getElementById('filter-status').value;
      const searchFilter = document.getElementById('filter-search').value.toLowerCase();

      let filtered = devices.filter(d => {
        if (typeFilter && d.type !== typeFilter) return false;
        if (statusFilter && d.status !== statusFilter) return false;
        if (searchFilter && !d.name.toLowerCase().includes(searchFilter) && !d.id.toLowerCase().includes(searchFilter)) return false;
        return true;
      });

      if (filtered.length === 0) { list.innerHTML = '<div class="empty-state"><p>没有找到匹配的设备</p></div>'; return; }

      list.innerHTML = filtered.map(device => `
        <div class="device-item" onclick="openDeviceDetail('${device.id}')">
          <div class="device-info"><h3>${device.name}</h3><p>${device.id} · ${device.business_unit || '未分配'}</p></div>
          <span class="device-type">${getTypeLabel(device.type)}</span>
          <span class="device-status status-${device.status}">${getStatusLabel(device.status)}</span>
          <div class="device-actions" onclick="event.stopPropagation()">
            <button class="btn-icon" onclick="openDeviceDetail('${device.id}')" title="查看详情">详情</button>
            <button class="btn-icon danger" onclick="deleteDevice('${device.id}')" title="删除">删除</button>
          </div>
        </div>`).join('');
    }

    function updateStats() {
      document.getElementById('stat-total').textContent = devices.length;
      document.getElementById('stat-active').textContent = devices.filter(d => d.status === 'active').length;
      document.getElementById('stat-pending').textContent = devices.filter(d => d.status === 'pending').length;
      document.getElementById('stat-error').textContent = devices.filter(d => d.status === 'error').length;
    }

    function getTypeLabel(type) { const labels = { container: '容器', physical_host: '物理主机', network_device: '网络设备', cloud_instance: '云实例', iot_device: 'IoT设备' }; return labels[type] || type; }
    function getStatusLabel(status) { const labels = { active: '在线', pending: '待注册', inactive: '离线', error: '异常' }; return labels[status] || status; }

    function openAddModal() { document.getElementById('add-modal').classList.add('active'); }
    function closeAddModal() { document.getElementById('add-modal').classList.remove('active'); document.getElementById('add-device-form').reset(); }

    async function openDeviceDetail(id) {
      const device = devices.find(d => d.id === id);
      if (!device) return;

      // 获取监控数据
      let metrics = null;
      try {
        const res = await fetch(`/api/devices/${id}/metrics`);
        if (res.ok) { const data = await res.json(); metrics = data.metrics; }
      } catch {}

      // 获取事件日志
      let events = [];
      try {
        const res = await fetch(`/api/devices/${id}/events`);
        if (res.ok) { const data = await res.json(); events = data.events; }
      } catch {}

      const content = document.getElementById('detail-content');
      content.innerHTML = `
        <div class="detail-header">
          <div>
            <h2 class="detail-title">${device.name}</h2>
            <p class="detail-meta">${device.id}</p>
            <div class="detail-badges">
              <span class="device-type">${getTypeLabel(device.type)}</span>
              <span class="device-status status-${device.status}">${getStatusLabel(device.status)}</span>
            </div>
          </div>
          <button class="btn btn-secondary" onclick="closeDetailModal()">关闭</button>
        </div>

        <div class="tabs">
          <button class="tab active" onclick="switchTab('overview')">概览</button>
          <button class="tab" onclick="switchTab('metrics')">监控</button>
          <button class="tab" onclick="switchTab('actions')">操作</button>
          <button class="tab" onclick="switchTab('events')">日志</button>
        </div>

        <div id="tab-overview" class="tab-content active">
          <div class="detail-grid">
            <div class="detail-card">
              <h3>基本信息</h3>
              <div class="metric-row"><span class="metric-label">设备名称</span><span class="metric-value">${device.name}</span></div>
              <div class="metric-row"><span class="metric-label">设备ID</span><span class="metric-value">${device.id}</span></div>
              <div class="metric-row"><span class="metric-label">设备类型</span><span class="metric-value">${getTypeLabel(device.type)}</span></div>
              <div class="metric-row"><span class="metric-label">状态</span><span class="metric-value status-${device.status}">${getStatusLabel(device.status)}</span></div>
              <div class="metric-row"><span class="metric-label">业务单元</span><span class="metric-value">${device.business_unit || '未分配'}</span></div>
              <div class="metric-row"><span class="metric-label">标签</span><span class="metric-value">${device.labels.map(l => Object.values(l).join(':')).join(', ') || '无'}</span></div>
            </div>
            <div class="detail-card">
              <h3>健康状态</h3>
              <div class="metric-row"><span class="metric-label">CPU 使用</span><span class="metric-value">${metrics ? metrics.cpu.usage.toFixed(1) + '%' : 'N/A'}</span></div>
              <div class="metric-row"><span class="metric-label">内存使用</span><span class="metric-value">${metrics ? metrics.memory.used + '/' + metrics.memory.total + ' GB' : 'N/A'}</span></div>
              <div class="metric-row"><span class="metric-label">网络</span><span class="metric-value">${metrics ? 'RX: ' + metrics.network.rx + ' MB/s' : 'N/A'}</span></div>
              <div class="metric-row"><span class="metric-label">磁盘</span><span class="metric-value">${metrics ? metrics.disk.used + '/' + metrics.disk.total + ' GB' : 'N/A'}</span></div>
            </div>
          </div>
        </div>

        <div id="tab-metrics" class="tab-content">
          <div class="detail-grid">
            <div class="detail-card">
              <h3>CPU 使用率</h3>
              <div class="metric-value" style="font-size: 2rem; margin-bottom: 12px;">${metrics ? metrics.cpu.usage.toFixed(1) + '%' : 'N/A'}</div>
              <div class="metric-bar"><div class="metric-bar-fill cpu" style="width: ${metrics ? metrics.cpu.usage : 0}%"></div></div>
              <p style="color: var(--color-text-muted); margin-top: 8px; font-size: 0.85rem;">${metrics ? metrics.cpu.cores + ' 核心' : ''}</p>
            </div>
            <div class="detail-card">
              <h3>内存使用</h3>
              <div class="metric-value" style="font-size: 2rem; margin-bottom: 12px;">${metrics ? ((metrics.memory.used / metrics.memory.total) * 100).toFixed(1) + '%' : 'N/A'}</div>
              <div class="metric-bar"><div class="metric-bar-fill memory" style="width: ${metrics ? (metrics.memory.used / metrics.memory.total) * 100 : 0}%"></div></div>
              <p style="color: var(--color-text-muted); margin-top: 8px; font-size: 0.85rem;">${metrics ? metrics.memory.used + ' / ' + metrics.memory.total + ' GB' : ''}</p>
            </div>
            <div class="detail-card">
              <h3>网络流量</h3>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div><p style="color: var(--color-text-muted); font-size: 0.8rem;">接收 (RX)</p><p style="font-size: 1.5rem; font-weight: 600; color: var(--color-success);">${metrics ? metrics.network.rx : 0} MB/s</p></div>
                <div><p style="color: var(--color-text-muted); font-size: 0.8rem;">发送 (TX)</p><p style="font-size: 1.5rem; font-weight: 600; color: var(--color-primary);">${metrics ? metrics.network.tx : 0} MB/s</p></div>
              </div>
            </div>
            <div class="detail-card">
              <h3>磁盘使用</h3>
              <div class="metric-value" style="font-size: 2rem; margin-bottom: 12px;">${metrics ? ((metrics.disk.used / metrics.disk.total) * 100).toFixed(1) + '%' : 'N/A'}</div>
              <div class="metric-bar"><div class="metric-bar-fill disk" style="width: ${metrics ? (metrics.disk.used / metrics.disk.total) * 100 : 0}%"></div></div>
              <p style="color: var(--color-text-muted); margin-top: 8px; font-size: 0.85rem;">${metrics ? metrics.disk.used + ' / ' + metrics.disk.total + ' GB' : ''}</p>
            </div>
          </div>
        </div>

        <div id="tab-actions" class="tab-content">
          <div class="action-grid">
            <button class="action-btn restart" onclick="executeAction('${id}', 'restart')">
              <span class="icon">🔄</span>
              <span class="label">重启</span>
            </button>
            <button class="action-btn stop" onclick="executeAction('${id}', 'stop')">
              <span class="icon">⏹</span>
              <span class="label">停止</span>
            </button>
            <button class="action-btn pause" onclick="executeAction('${id}', 'pause')">
              <span class="icon">⏸</span>
              <span class="label">暂停</span>
            </button>
            <button class="action-btn" onclick="executeAction('${id}', 'resume')">
              <span class="icon">▶</span>
              <span class="label">恢复</span>
            </button>
          </div>
          <div style="margin-top: 24px; padding: 16px; background: var(--color-bg); border-radius: var(--radius-md);">
            <h4 style="margin-bottom: 12px; color: var(--color-text-secondary);">快速操作</h4>
            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
              <button class="btn btn-secondary btn-sm" onclick="executeAction('${id}', 'restart')">重启服务</button>
              <button class="btn btn-secondary btn-sm" onclick="executeAction('${id}', 'stop')">强制停止</button>
              <button class="btn btn-secondary btn-sm" onclick="executeAction('${id}', 'pause')">暂停服务</button>
              <button class="btn btn-ghost btn-sm" onclick="refreshMetrics('${id}')">刷新监控</button>
            </div>
          </div>
        </div>

        <div id="tab-events" class="tab-content">
          <div class="event-timeline">
            ${events.length > 0 ? events.map(e => `
              <div class="event-item ${e.type}">
                <div style="flex: 1;">
                  <p class="event-message">${e.message}</p>
                  <p class="event-type">${e.type}</p>
                </div>
                <span class="event-time">${formatTime(e.timestamp)}</span>
              </div>
            `).join('') : '<div class="empty-state"><p>暂无事件记录</p></div>'}
          </div>
        </div>
      `;

      document.getElementById('detail-modal').classList.add('active');
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector(`.tab[onclick="switchTab('${tabName}')"]`).classList.add('active');
      document.getElementById(`tab-${tabName}`).classList.add('active');
    }

    function closeDetailModal() { document.getElementById('detail-modal').classList.remove('active'); }

    async function executeAction(id, action) {
      try {
        const res = await fetch(`/api/devices/${id}/actions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action })
        });
        const data = await res.json();
        if (data.success) {
          showToast(`${action === 'restart' ? '重启' : action === 'stop' ? '停止' : action === 'pause' ? '暂停' : '恢复'}操作已执行`, 'success');
        } else {
          showToast(data.error || '操作失败', 'error');
        }
      } catch (error) {
        showToast('操作失败: ' + error.message, 'error');
      }
    }

    async function refreshMetrics(id) {
      showToast('正在刷新监控数据...', 'info');
      openDeviceDetail(id);
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function handleAddDevice(e) {
      e.preventDefault();
      const name = document.getElementById('device-name').value;
      const type = document.getElementById('device-type').value;
      const businessUnit = document.getElementById('device-business-unit').value;
      const labelsInput = document.getElementById('device-labels').value;
      const labels = labelsInput.split(',').map(l => { const [key, value] = l.trim().split(':'); return key && value ? { [key.trim()]: value.trim() } : null; }).filter(l => l);
      const device = { id: 'dev-' + Date.now(), name, type, status: 'pending', business_unit: businessUnit || null, labels, last_seen: new Date().toISOString() };
      devices.push(device); closeAddModal(); renderDevices(); updateStats(); showToast('设备添加成功', 'success');
      fetch('/api/devices', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(device) }).catch(() => {});
    }

    function deleteDevice(id) { if (confirm('确定要删除这个设备吗?')) { devices = devices.filter(d => d.id !== id); renderDevices(); updateStats(); showToast('设备已删除', 'success'); fetch(`/api/devices/${id}`, { method: 'DELETE' }).catch(() => {}); } }

    function showToast(message, type = 'success') { const toast = document.getElementById('toast'); toast.textContent = message; toast.className = `toast ${type} show`; setTimeout(() => { toast.classList.remove('show'); }, 3000); }

    // View switching
    function switchView(viewName) {
      document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(`view-${viewName}`).style.display = 'block';
      document.getElementById(`nav-${viewName}`).classList.add('active');

      if (viewName === 'pipelines') loadPipelines();
      if (viewName === 'runs') loadRuns();
      if (viewName === 'logs') loadLogs();
    }

    // Pipeline functions
    let pipelines = [];
    let runs = [];

    async function loadPipelines() {
      try {
        const res = await fetch('/api/pipelines');
        const data = await res.json();
        pipelines = data.pipelines || [];
        renderPipelines();
        updatePipelineStats();
      } catch (e) { console.error('Failed to load pipelines:', e); }
    }

    async function loadRuns() {
      try {
        const res = await fetch('/api/runs');
        const data = await res.json();
        runs = data.runs || [];
        renderRuns();
      } catch (e) { console.error('Failed to load runs:', e); }
    }

    function renderPipelines() {
      const list = document.getElementById('pipeline-list');
      if (pipelines.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>暂无流水线</p></div>';
        return;
      }
      list.innerHTML = pipelines.map(p => `
        <div class="pipeline-item">
          <div class="pipeline-info">
            <div>
              <h3>${p.name}</h3>
              <p>${p.description || '无描述'} | ${p.stages?.join(' → ') || ''}</p>
            </div>
            <div class="pipeline-meta">
              <button class="btn btn-primary btn-sm" onclick="executePipeline('${p.id}')">执行</button>
              <button class="btn btn-secondary btn-sm" onclick="openPipelineDetail('${p.id}')">详情</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderRuns() {
      const list = document.getElementById('run-list');
      if (runs.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>暂无执行记录</p></div>';
        return;
      }
      list.innerHTML = runs.map(r => `
        <div class="run-item">
          <div class="run-info">
            <div>
              <h3>${r.pipeline_name}</h3>
              <p>${r.id.slice(0,8)}... | ${formatTime(r.started_at)}</p>
            </div>
            <div class="run-meta">
              <span class="run-status status-${r.status}">${getStatusText(r.status)}</span>
              <button class="btn btn-ghost btn-sm" onclick="viewRunLogs('${r.id}')">日志</button>
            </div>
          </div>
          <div class="pipeline-stages">
            ${(r.stages || []).map(s => `<span class="stage-badge ${s.status}">${s.name}: ${getStatusText(s.status)}</span>`).join('')}
          </div>
        </div>
      `).join('');
    }

    function updatePipelineStats() {
      document.getElementById('pipeline-count').textContent = pipelines.length;
    }

    async function executePipeline(id) {
      try {
        const res = await fetch(`/api/pipelines/${id}/execute`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ triggered_by: 'ui' }) });
        const data = await res.json();
        if (data.success) {
          showToast('流水线已启动', 'success');
          loadPipelines();
          loadRuns();
        }
      } catch (e) { showToast('执行失败', 'error'); }
    }

    async function viewRunLogs(runId) {
      try {
        const res = await fetch(`/api/runs`);
        const data = await res.json();
        const run = (data.runs || []).find(r => r.id === runId);
        if (run) {
          alert(`执行日志:\n${run.logs.map(l => `[${l.timestamp}] [${l.stage}] ${l.message}`).join('\n')}`);
        }
      } catch (e) { console.error(e); }
    }

    function getStatusText(status) {
      const map = { pending: '等待', running: '运行中', success: '成功', failed: '失败', cancelled: '取消' };
      return map[status] || status;
    }

    function openPipelineModal() {
      const name = prompt('流水线名称:');
      if (!name) return;
      const desc = prompt('描述 (可选):') || '';
      const stages = prompt('阶段 (逗号分隔，如: validate,build,test,deploy):') || 'validate,build,test,deploy';
      const pipeline = {
        name, description: desc,
        stages: stages.split(',').map(s => s.trim()),
        repository: 'git@example.com/demo.git',
        branch: 'main'
      };
      fetch('/api/pipelines', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(pipeline) })
        .then(res => res.json())
        .then(data => {
          if (data.success) { showToast('流水线创建成功', 'success'); loadPipelines(); }
        })
        .catch(() => showToast('创建失败', 'error'));
    }

    async function openPipelineDetail(id) {
      try {
        const res = await fetch(`/api/pipelines/${id}`);
        const data = await res.json();
        if (data.pipeline) {
          const runs = data.stats ? '' : `\n成功: ${data.stats?.success_count || 0}\n失败: ${data.stats?.failed_count || 0}`;
          alert(`流水线详情:\n\n名称: ${data.pipeline.name}\n描述: ${data.pipeline.description || '无'}\n阶段: ${data.pipeline.stages?.join(' → ') || ''}${runs}`);
        }
      } catch (e) { console.error(e); }
    }

    // Log functions
    let logData = { logs: [], total: 0 };

    async function loadLogs() {
      try {
        const level = document.getElementById('log-level').value;
        const source = document.getElementById('log-source').value;
        const search = document.getElementById('log-search').value;

        let url = '/api/logs?limit=100&order=desc';
        if (level) url += `&level=${level}`;
        if (source) url += `&source=${encodeURIComponent(source)}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;

        const res = await fetch(url);
        const data = await res.json();
        logData = { logs: data.logs || [], total: data.total || 0 };
        renderLogs();
        await loadLogStats();
      } catch (e) { console.error('Failed to load logs:', e); }
    }

    async function loadLogStats() {
      try {
        const res = await fetch('/api/logs/stats');
        const data = await res.json();
        if (data.stats) {
          document.getElementById('log-total').textContent = data.stats.total || 0;
          document.getElementById('log-last-hour').textContent = data.stats.last_hour || 0;
          document.getElementById('log-error-rate').textContent = (data.stats.error_rate || 0) + '%';
        }

        const alertRes = await fetch('/api/logs/alerts');
        const alertData = await alertRes.json();
        document.getElementById('log-alert-count').textContent = (alertData.alerts || []).length;
      } catch (e) { console.error('Failed to load log stats:', e); }
    }

    function renderLogs() {
      const list = document.getElementById('log-list');
      if (logData.logs.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>暂无日志</p></div>';
        return;
      }

      list.innerHTML = logData.logs.map(log => `
        <div class="log-item">
          <div class="log-header">
            <div>
              <span class="log-level-badge ${log.level}">${log.level.toUpperCase()}</span>
              <span class="log-source">${log.source || 'unknown'}</span>
            </div>
            <div class="log-meta">${formatTime(log.timestamp)}</div>
          </div>
          <div class="log-message">${escapeHtml(log.message)}</div>
          ${log.resource ? `<div class="log-meta" style="margin-top: 4px;">资源: ${log.resource}</div>` : ''}
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function generateLogs() {
      try {
        const res = await fetch('/api/logs/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ count: 50 }) });
        const data = await res.json();
        if (data.success) {
          showToast(`已生成 ${data.generated} 条示例日志`, 'success');
          loadLogs();
        }
      } catch (e) { showToast('生成日志失败', 'error'); }
    }

    async function openAlertModal() {
      const name = prompt('告警规则名称:');
      if (!name) return;
      const pattern = prompt('匹配模式 (正则或关键字):');
      if (!pattern) return;
      const level = prompt('日志级别 (debug, info, warn, error):', 'error');
      if (!level) return;

      try {
        const res = await fetch('/api/logs/alerts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, pattern, level })
        });
        const data = await res.json();
        if (data.success) {
          showToast('告警规则创建成功', 'success');
          loadLogStats();
        }
      } catch (e) { showToast('创建告警失败', 'error'); }
    }
  </script>
</body>
</html>
