3# SNMPd configuration for simulated network devices

# Agent behavior
agentAddress  udp:161,udp:[::1]:161
rocommunity public
rwcommunity private

# System information
sysLocation    Lab Environment
sysContact     devops@example.com
sysName        simulated-network-device

# SNMPv2-MIB
snmp-server 1.3.6.1.2.1.1.1.0 "Ubuntu 20.04 SNMP Device"
snmp-server 1.3.6.1.2.1.1.2.0 1.3.6.1.4.1.8072.3.2.10

# IF-MIB: Network Interfaces (simulated)
# ifNumber
snmp-server 1.3.6.1.2.1.2.1.0 4

# ifDescr
snmp-server 1.3.6.1.2.1.2.2.1.2.1 "eth0"
snmp-server 1.3.6.1.2.1.2.2.1.2.2 "eth1"
snmp-server 1.3.6.1.2.1.2.2.1.2.3 "lo"
snmp-server 1.3.6.1.2.1.2.2.1.2.4 "vlan100"

# ifType
snmp-server 1.3.6.1.2.1.2.2.1.3.1 6    # ethernetCsmacd
snmp-server 1.3.6.1.2.1.2.2.1.3.2 6    # ethernetCsmacd
snmp-server 1.3.6.1.2.1.2.2.1.3.3 24   # softwareLoopback
snmp-server 1.3.6.1.2.1.2.2.1.3.4 6    # ethernetCsmacd

# ifSpeed (bits per second)
snmp-server 1.3.6.1.2.1.2.2.1.5.1 1000000000
snmp-server 1.3.6.1.2.1.2.2.1.5.2 1000000000
snmp-server 1.3.6.1.2.1.2.2.1.5.3 10000000
snmp-server 1.3.6.1.2.1.2.2.1.5.4 1000000000

# ifOperStatus (1=up, 2=down, 3=testing, 7=unknown)
snmp-server 1.3.6.1.2.1.2.2.1.8.1 1
snmp-server 1.3.6.1.2.1.2.2.1.8.2 1
snmp-server 1.3.6.1.2.1.2.2.1.8.3 1
snmp-server 1.3.6.1.2.1.2.2.1.8.4 1

# ifAdminStatus (1=up, 2=down)
snmp-server 1.3.6.1.2.1.2.2.1.7.1 1
snmp-server 1.3.6.1.2.1.2.2.1.7.2 1
snmp-server 1.3.6.1.2.1.2.2.1.7.3 1
snmp-server 1.3.6.1.2.1.2.2.1.7.4 1

# ifInOctets / ifOutOctets (simulated counters)
snmp-server 1.3.6.1.2.1.2.2.1.10.1 123456789
snmp-server 1.3.6.1.2.1.2.2.1.10.2 987654321
snmp-server 1.3.6.1.2.1.2.2.1.10.3 12345
snmp-server 1.3.6.1.2.1.2.2.1.10.4 555666777
snmp-server 1.3.6.1.2.1.2.2.1.16.1 111222333
snmp-server 1.3.6.1.2.1.2.2.1.16.2 444555666
snmp-server 1.3.6.1.2.1.2.2.1.16.3 999888777
snmp-server 1.3.6.1.2.1.2.2.1.16.4 123456789

# Uptime
snmp-server 1.3.6.1.2.1.1.3.0 1234567

# Process number
snmp-server 1.3.6.1.4.1.2021.50.101.1 0
