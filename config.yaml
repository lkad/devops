server:
  port: 3000
  host: "0.0.0.0"

database:
  host: "localhost"
  port: 5432
  user: "devops"
  password: "devops"
  name: "devops_toolkit"
  sslmode: "disable"

logs:
  backend: "local"
  retention_days: 30
  path: "./data/logs"

k8s:
  provider: "k3d"
  kubeconfig_path: "./data/kubeconfig"

# Development bypass mode - DO NOT USE IN PRODUCTION
# Set dev_bypass: true OR environment variable DEVOPS_AUTH_BYPASS=true
# Then set dev_username and dev_password for local authentication without LDAP
auth:
  jwt_secret: "devops-toolkit-change-in-production"
  session_duration: "8h"
  dev_bypass: true
  dev_username: "dev"
  dev_password: "dev"
  dev_roles:
    - "Developer"